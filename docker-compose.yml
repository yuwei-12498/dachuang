services:
  citytrip-allinone:
    image: ${DOCKERHUB_IMAGE:-yourname/citytrip-allinone}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: citytrip-allinone
    restart: unless-stopped
    ports:
      - "${HOST_HTTP_PORT:-80}:80"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      APP_DB_NAME: "${APP_DB_NAME:-city_trip_db}"
      APP_DB_USERNAME: "${APP_DB_USERNAME:-citytrip}"
      APP_DB_PASSWORD: "${APP_DB_PASSWORD}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      APP_JWT_SECRET: "${APP_JWT_SECRET}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4}"
      LLM_PROVIDER: "${LLM_PROVIDER:-mock}"
      LLM_FALLBACK_TO_MOCK: "${LLM_FALLBACK_TO_MOCK:-true}"
      JAVA_OPTS: "${JAVA_OPTS:--Xms512m -Xmx1024m}"
    volumes:
      - citytrip_data:/opt/citytrip/data

volumes:
  citytrip_data:
