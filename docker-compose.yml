services:
  citytrip-allinone:
    image: ${DOCKERHUB_IMAGE:-yourname/citytrip-allinone}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: citytrip-allinone
    restart: unless-stopped
    ports:
      - "${HOST_HTTP_PORT:-80}:80"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      SERVER_PORT: "${APP_PORT:-8081}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      APP_DB_NAME: "${APP_DB_NAME:-city_trip_db}"
      APP_DB_USERNAME: "${APP_DB_USERNAME:-citytrip}"
      APP_DB_PASSWORD: "${APP_DB_PASSWORD}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      APP_JWT_SECRET: "${APP_JWT_SECRET}"
      DB_USERNAME: "${DB_USERNAME:-root}"
      DB_PASSWORD: "${DB_PASSWORD:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4}"
      OPENAI_CHAT_MODEL: "${OPENAI_CHAT_MODEL:-}"
      OPENAI_TEXT_MODEL: "${OPENAI_TEXT_MODEL:-}"
      OPENAI_TOOL_MODEL: "${OPENAI_TOOL_MODEL:-}"
      APP_GEO_ENABLED: "${APP_GEO_ENABLED:-false}"
      APP_GEO_BASE_URL: "${APP_GEO_BASE_URL:-}"
      APP_GEO_API_KEY: "${APP_GEO_API_KEY:-}"
      APP_GEO_API_KEY_QUERY_NAME: "${APP_GEO_API_KEY_QUERY_NAME:-key}"
      APP_GEO_API_KEY_HEADER_NAME: "${APP_GEO_API_KEY_HEADER_NAME:-}"
      APP_GEO_KEYWORD_PATH: "${APP_GEO_KEYWORD_PATH:-/geo/search}"
      APP_GEO_NEARBY_PATH: "${APP_GEO_NEARBY_PATH:-/geo/nearby}"
      APP_GEO_GEOCODE_PATH: "${APP_GEO_GEOCODE_PATH:-/geo/geocode}"
      APP_GEO_ROUTE_PATH: "${APP_GEO_ROUTE_PATH:-}"
      APP_PLANNING_AI_TIMEOUT_MS: "${APP_PLANNING_AI_TIMEOUT_MS:-25000}"
      LLM_PROVIDER: "${LLM_PROVIDER:-mock}"
      LLM_FALLBACK_TO_MOCK: "${LLM_FALLBACK_TO_MOCK:-true}"
      JAVA_OPTS: "${JAVA_OPTS:--Xms512m -Xmx1024m}"
    volumes:
      - citytrip_data:/opt/citytrip/data

volumes:
  citytrip_data:
